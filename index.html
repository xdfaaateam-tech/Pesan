<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sinematik Ulang Tahun | Untuk Pelangiii</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #ff9a9e, #fad0c4, #fad0c4, #a1c4fd);
            background-attachment: fixed;
        }

        /* Global screen wrapper */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1), visibility 0s;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Opening cinematic black layer */
        #openingScreen {
            background: #000000;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
        }

        .cinematic-text {
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 1.2s ease, transform 0.8s ease;
            font-weight: 400;
            text-shadow: 0 0 20px rgba(255,255,200,0.6);
        }

        /* Story Mode Styles - Enhanced */
        .story-card {
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(28px);
            border-radius: 64px;
            padding: 2.8rem;
            width: 88%;
            max-width: 750px;
            text-align: center;
            border: 1px solid rgba(255,255,240,0.5);
            box-shadow: 0 35px 60px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }

        .story-text {
            font-size: 1.45rem;
            line-height: 1.6;
            font-weight: 500;
            color: #fff8f0;
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            margin: 1rem 0;
            max-height: 60vh;
            overflow-y: auto;
            padding: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: 'Poppins', 'Segoe UI', system-ui;
        }

        /* Special birthday name styling - professional & elegant */
        .birthday-name {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #FF6B6B, #C084FC);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            animation: goldenShine 2s ease-in-out infinite alternate;
            text-shadow: 0 0 15px rgba(255,215,0,0.4);
            letter-spacing: -0.5px;
        }

        @keyframes goldenShine {
            0% { filter: drop-shadow(0 0 4px #ffb347); opacity: 0.95; background-position: 0% 50%;}
            100% { filter: drop-shadow(0 0 18px #ffaa44); opacity: 1; background-position: 100% 50%;}
        }

        .floating-stars {
            display: inline-block;
            animation: floatStar 3s ease-in-out infinite;
        }

        @keyframes floatStar {
            0%, 100% { transform: translateY(0px) rotate(0deg);}
            50% { transform: translateY(-5px) rotate(5deg);}
        }

        .btn-lanjut {
            background: rgba(255,255,245,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 12px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-top: 1rem;
            letter-spacing: 1px;
        }

        .btn-lanjut:hover {
            transform: scale(1.05);
            background: rgba(255,215,180,0.4);
            box-shadow: 0 0 18px rgba(255,200,150,0.6);
        }

        .btn-lanjut:active {
            transform: scale(0.97);
        }

        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10);
            opacity: 0;
            transition: transform 0.5s, opacity 0.6s;
        }
        .ripple:active:after {
            transform: scale(0);
            opacity: 0.4;
            transition: 0s;
        }

        /* password section */
        .password-box {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(24px);
            border-radius: 56px;
            padding: 2rem;
            text-align: center;
            width: 90%;
            max-width: 520px;
            border: 1px solid rgba(255,255,200,0.3);
        }
        .password-input {
            width: 80%;
            padding: 14px 24px;
            margin: 20px 0;
            border-radius: 60px;
            border: none;
            background: rgba(255,255,245,0.95);
            font-size: 1rem;
            text-align: center;
            outline: none;
            font-family: monospace;
        }
        .secret-message {
            font-size: 1.2rem;
            line-height: 1.5;
            color: #fff3df;
            background: rgba(0,0,0,0.65);
            padding: 28px;
            border-radius: 48px;
            margin-top: 20px;
            white-space: pre-wrap;
            text-align: left;
            max-height: 50vh;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.3);
        }

        /* canvas fireworks */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
        }

        .scene-transition {
            animation: sceneEnter 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes sceneEnter {
            0% { opacity: 0; transform: scale(0.96) translateY(18px); filter: blur(8px);}
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0);}
        }

        .zoom-effect {
            animation: cameraZoom 0.45s ease-out;
        }

        @keyframes cameraZoom {
            0% { transform: scale(1);}
            50% { transform: scale(1.06);}
            100% { transform: scale(1);}
        }

        @media (max-width: 550px) {
            .story-text { font-size: 1.1rem; }
            .story-card { padding: 1.8rem; width: 92%;}
            .birthday-name { font-size: 1.8rem; }
        }

        .audio-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: white;
            z-index: 3000;
            pointer-events: none;
            font-family: monospace;
        }

        /* Floating particles background */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
<div class="floating-bg" id="floatingBg"></div>
<div id="openingScreen" class="screen">
    <div class="cinematic-text" id="cinematicLine1">Something is prepared...</div>
    <div class="cinematic-text" id="cinematicLine2" style="margin-top: 20px;">Just for you</div>
</div>

<!-- STORY MODE CONTAINER (langsung, tanpa locked state) -->
<div id="storyScreen" class="screen hidden">
    <div class="story-card" id="storyCard">
        <div class="story-text" id="storyText"></div>
        <button class="btn-lanjut ripple" id="nextSceneBtn">Lanjut ➤</button>
    </div>
</div>

<!-- PASSWORD LOCK / SECRET AREA -->
<div id="passwordScreen" class="screen hidden">
    <div class="password-box">
        <h3 style="color:white;">🔒 Pesan Tersegel</h3>
        <p style="color:#ffdfb3;">"kapan kita kenal 👀"</p>
        <input type="text" id="secretInput" class="password-input" placeholder="Tulis jawabanmu...">
        <button id="verifyBtn" class="btn-lanjut" style="margin-top: 10px;">Buka Rahasia</button>
        <div id="secretReveal" class="secret-message hidden"></div>
    </div>
</div>

<canvas id="fireworksCanvas"></canvas>
<div class="audio-hint" id="audioHint">🎵 ketuk layar untuk suara & musik</div>

<script>
    // ------------------- AUDIO & SOUND SYSTEM ------------------
    let audioCtx = null;
    let isAudioAllowed = false;
    let currentMusicInterval = null;
    let musicPlaying = false;
    
    const tracks = [
        { name: "dreamy", notes: [261.63, 329.63, 392.00, 523.25], bpm: 100 },
        { name: "gentle", notes: [293.66, 369.99, 440.00, 587.33], bpm: 85 },
        { name: "uplift", notes: [329.63, 392.00, 493.88, 587.33], bpm: 110 }
    ];
    
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    function playClickSound() {
        if (!isAudioAllowed || !audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
        osc.start();
        osc.stop(now + 0.25);
    }
    
    function playWhoosh() {
        if (!isAudioAllowed || !audioCtx) return;
        const now = audioCtx.currentTime;
        const noise = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        noise.type = "sawtooth";
        noise.connect(gain);
        gain.connect(audioCtx.destination);
        noise.frequency.value = 300;
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
        noise.frequency.exponentialRampToValueAtTime(80, now + 0.4);
        noise.start();
        noise.stop(now + 0.45);
    }
    
    function playUnlockImpact() {
        if (!isAudioAllowed || !audioCtx) return;
        const now = audioCtx.currentTime;
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);
        osc1.frequency.value = 523.25;
        osc2.frequency.value = 659.25;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        osc1.start();
        osc2.start();
        osc1.stop(now + 0.7);
        osc2.stop(now + 0.7);
    }
    
    function stopBackgroundMusic() {
        if (currentMusicInterval) {
            clearInterval(currentMusicInterval);
            currentMusicInterval = null;
        }
        musicPlaying = false;
    }
    
    function startBackgroundMusic(trackIndex) {
        if (!isAudioAllowed || !audioCtx) return;
        stopBackgroundMusic();
        const track = tracks[trackIndex % tracks.length];
        if (!track) return;
        musicPlaying = true;
        let step = 0;
        const intervalTime = (60 / track.bpm) * 0.5 * 1000;
        const playNote = () => {
            if (!musicPlaying || !isAudioAllowed || !audioCtx) return;
            const now = audioCtx.currentTime;
            const note = track.notes[step % track.notes.length];
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.frequency.value = note;
            gainNode.gain.setValueAtTime(0.07, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            osc.start();
            osc.stop(now + 0.4);
            step++;
        };
        playNote();
        currentMusicInterval = setInterval(() => {
            if (musicPlaying && isAudioAllowed) playNote();
            else if (!musicPlaying) clearInterval(currentMusicInterval);
        }, intervalTime);
    }
    
    // ========== STORY SCENES (tanpa countdown, langsung) ==========
    // Scene 0: Pesan pembuka yang hangat
    // Scene 1: Ucapan ulang tahun dengan harapan tulus: kesehatan, kebahagiaan, keinginan terwujud
    const storyScenes = [
        "halooo pelangiiiii 🌈\n\nHari ini bukan sekadar penanda bertambahnya usia,\nmengingatkan akan semua perjalanan yang telah kamu lalui.\n\nSetiap langkah yang kau tempuh telah membentukmu menjadi pribadi yang berharga.\n\n✨ Bersiaplah untuk menerima doa dan harapan teristimewa... ✨",
        
        // UCAPAN ULANG TAHUN DENGAN HARAPAN YANG DALAM
        "✨ 𝐇𝐀𝐏𝐏𝐘 𝐁𝐈𝐑𝐓𝐇𝐃𝐀𝐘, 𝐏𝐄𝐋𝐀𝐍𝐆𝐈𝐈𝐈 ✨\n\n<span class='birthday-name'>🌟 Pelangiii 🌟</span>\n\nDi hari yang istimewa ini, aku ingin menyampaikan harapan terbaik untukmu:\n\n🌿 **Semoga kesehatan selalu menyertai setiap langkahmu.**\n🌿 **Semoga kebahagiaan hadir tanpa diundang dan bertahan lama.**\n🌿 **Semoga setiap keinginan yang tulus dari hatimu, satu per satu menjadi nyata.**\n🌿 **Semoga usiamu yang baru membawa lebih banyak senyum, kedamaian, dan cinta.**\n\nKamu layak mendapatkan segala hal baik di dunia ini. Teruslah bermimpi, teruslah berusaha, karena masa depanmu cerah dan penuh kemungkinan.\n\n🎂 Selamat merayakan babak baru yang penuh berkah. 🎂\n\n<span class='floating-stars'>✨💫✨</span>"
    ];
    
    let currentSceneIndex = 0;
    let storyActive = false;
    
    function startStoryMode() {
        currentSceneIndex = 0;
        storyActive = true;
        const storyScreen = document.getElementById('storyScreen');
        storyScreen.classList.remove('hidden');
        showScene(currentSceneIndex);
        document.getElementById('storyCard').classList.add('scene-transition');
        setTimeout(() => document.getElementById('storyCard').classList.remove('scene-transition'), 800);
    }
    
    function showScene(index) {
        const storyTextDiv = document.getElementById('storyText');
        let rawText = storyScenes[index];
        if (index === 1) {
            storyTextDiv.innerHTML = rawText;
        } else {
            storyTextDiv.innerText = rawText;
        }
        storyTextDiv.style.animation = 'none';
        storyTextDiv.offsetHeight;
        storyTextDiv.style.animation = 'sceneEnter 0.5s ease forwards';
        if (isAudioAllowed) startBackgroundMusic(index === 1 ? 2 : 0);
    }
    
    function transitionToNextScene() {
        if (!storyActive) return;
        const card = document.getElementById('storyCard');
        card.style.transform = 'scale(1.02)';
        setTimeout(() => { if(card) card.style.transform = ''; }, 250);
        playWhoosh();
        playClickSound();
        if (currentSceneIndex + 1 < storyScenes.length) {
            currentSceneIndex++;
            showScene(currentSceneIndex);
            card.classList.add('zoom-effect');
            setTimeout(() => card.classList.remove('zoom-effect'), 400);
        } else if (currentSceneIndex + 1 === storyScenes.length) {
            currentSceneIndex++;
            showPasswordScreen();
        }
    }
    
    function showPasswordScreen() {
        storyActive = false;
        stopBackgroundMusic();
        document.getElementById('storyScreen').classList.add('hidden');
        const pwdScreen = document.getElementById('passwordScreen');
        pwdScreen.classList.remove('hidden');
        pwdScreen.style.opacity = '0';
        setTimeout(() => pwdScreen.style.opacity = '1', 20);
        pwdScreen.style.transition = 'opacity 0.8s';
        pwdScreen.style.opacity = '1';
    }
    
    // ========== FIREWORKS SYSTEM (Enhanced) ==========
    let fireworksActive = false;
    let particles = [];
    let canvas = document.getElementById('fireworksCanvas');
    let ctx = canvas.getContext('2d');
    let animationId = null;
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    
    class Particle {
        constructor(x, y, vx, vy, color, life) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.color = color; this.life = life; this.maxLife = life;
            this.size = 4 + Math.random() * 6;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.12;
            this.life -= 2.2;
            return this.life > 0;
        }
        draw() {
            ctx.globalAlpha = Math.min(1, this.life / this.maxLife);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * (this.life/this.maxLife), 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    function spawnFireworks() {
        if (!fireworksActive) return;
        const centerX = canvas.width/2;
        const centerY = canvas.height/2;
        const color = `hsl(${Math.random() * 360}, 100%, 65%)`;
        for (let i=0; i<70; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 8;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            particles.push(new Particle(centerX, centerY, vx, vy, color, 110 + Math.random() * 60));
        }
    }
    
    function animateFireworks() {
        if (!fireworksActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let anyAlive = false;
        for (let i=0; i<particles.length; i++) {
            const alive = particles[i].update();
            particles[i].draw();
            if (alive) anyAlive = true;
            else particles.splice(i,1), i--;
        }
        if (anyAlive || particles.length > 0) {
            animationId = requestAnimationFrame(animateFireworks);
        } else {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
    }
    
    function startFireworks(duration = 5500) {
        if (fireworksActive) return;
        fireworksActive = true;
        resizeCanvas();
        particles = [];
        const interval = setInterval(() => {
            if (!fireworksActive) clearInterval(interval);
            else spawnFireworks();
        }, 250);
        animateFireworks();
        setTimeout(() => {
            fireworksActive = false;
            clearInterval(interval);
            if (animationId) cancelAnimationFrame(animationId);
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles = [];
        }, duration);
    }
    
    // Secret message validation
    function verifySecret() {
        const input = document.getElementById('secretInput').value.toLowerCase();
        if (input.includes('20') && input.includes('maret') && input.includes('2024')) {
            playUnlockImpact();
            const secretDiv = document.getElementById('secretReveal');
            secretDiv.classList.remove('hidden');
            secretDiv.innerHTML = `✨🌸 𝐏𝐄𝐒𝐀𝐍 𝐑𝐀𝐇𝐀𝐒𝐈𝐀 𝐔𝐍𝐓𝐔𝐊 𝐏𝐄𝐋𝐀𝐍𝐆𝐈𝐈𝐈 🌸✨\n\nTerima kasih telah hadir dalam perjalanan hidup ini.\n\nDari sekian banyak waktu yang berlalu,\nada satu momen yang selalu memiliki tempat tersendiri—\nsaat semuanya mulai terasa lebih berarti.\n\nKamu mungkin tidak selalu menyadarinya,\ntetapi kehadiranmu membawa ketenangan dan warna tersendiri.\n\nSeperti yang telah kuharapkan untukmu:\n✨ Tetap sehat selalu, agar bisa menikmati indahnya hari.\n✨ Semoga segala keinginan baikmu menjadi nyata.\n✨ Dan kebahagiaan selalu menyertai setiap langkah.\n\n💫 𝐒𝐄𝐋𝐀𝐌𝐀𝐓 𝐔𝐋𝐀𝐍𝐆 𝐓𝐀𝐇𝐔𝐍, 𝐏𝐄𝐋𝐀𝐍𝐆𝐈𝐈𝐈! 💫\n\nTeruslah bersinar, dunia ini lebih indah karenamu.`;
            
            const mainBody = document.body;
            mainBody.style.transition = 'transform 0.7s cubic-bezier(0.2,0.9,0.4,1.2)';
            mainBody.style.transform = 'scale(1.03)';
            setTimeout(() => mainBody.style.transform = 'scale(1)', 800);
            startFireworks(6000);
            document.getElementById('verifyBtn').disabled = true;
        } else {
            playClickSound();
            const secretDiv = document.getElementById('secretReveal');
            secretDiv.classList.remove('hidden');
            secretDiv.innerHTML = "❌ Jawaban kurang tepat, coba ingat momen manis itu... 💭\n(Hint: mengandung angka 20, bulan Maret, dan tahun 2024)";
            setTimeout(() => { if(secretDiv) secretDiv.classList.add('hidden'); }, 2500);
        }
    }
    
    // ---- OPENING CINEMATIC ----
    function runOpening() {
        const line1 = document.getElementById('cinematicLine1');
        const line2 = document.getElementById('cinematicLine2');
        line1.style.opacity = '0';
        line2.style.opacity = '0';
        setTimeout(() => { line1.style.opacity = '1'; line1.style.transform = 'scale(1)'; }, 300);
        setTimeout(() => { line2.style.opacity = '1'; line2.style.transform = 'scale(1)'; }, 1800);
        setTimeout(() => {
            const openingDiv = document.getElementById('openingScreen');
            openingDiv.style.opacity = '0';
            setTimeout(() => {
                openingDiv.classList.add('hidden');
                // Langsung masuk ke story mode (tanpa countdown)
                startStoryMode();
            }, 1000);
        }, 3200);
    }
    
    function enableAudioAndMusic() {
        if (isAudioAllowed) return;
        initAudio();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                isAudioAllowed = true;
                document.getElementById('audioHint').style.opacity = '0';
                if (storyActive && !document.getElementById('passwordScreen').classList.contains('hidden') === false && document.getElementById('storyScreen').classList.contains('hidden') === false) {
                    startBackgroundMusic(currentSceneIndex === 1 ? 2 : 0);
                }
            });
        } else {
            isAudioAllowed = true;
        }
    }
    
    document.body.addEventListener('click', (e) => {
        if (!isAudioAllowed && (e.target.closest('.btn-lanjut, #verifyBtn'))) {
            enableAudioAndMusic();
            playClickSound();
        } else if (!isAudioAllowed) {
            enableAudioAndMusic();
        } else {
            if (e.target.closest('.btn-lanjut')) playClickSound();
        }
    });
    
    document.getElementById('nextSceneBtn').addEventListener('click', () => {
        if (!isAudioAllowed) enableAudioAndMusic();
        if (storyActive) transitionToNextScene();
    });
    document.getElementById('verifyBtn').addEventListener('click', () => {
        if (!isAudioAllowed) enableAudioAndMusic();
        verifySecret();
    });
    
    window.addEventListener('load', () => {
        resizeCanvas();
        runOpening();
        // Floating background soft stars
        const floatingDiv = document.getElementById('floatingBg');
        for(let i=0;i<50;i++) {
            let star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'rgba(255,255,200,0.4)';
            star.style.borderRadius = '50%';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animation = `floatStar ${5+Math.random()*6}s infinite linear`;
            floatingDiv.appendChild(star);
        }
    });
    
    const btns = document.querySelectorAll('.btn-lanjut, #verifyBtn');
    btns.forEach(btn => btn.classList.add('ripple'));
</script>
</body>
</html>
